name = "church-waiting-room"
main = "src/index.js"
compatibility_date = "2026-04-21"

[[routes]]
pattern = "live.rctranslation.org/*"
zone_name = "rctranslation.org"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
